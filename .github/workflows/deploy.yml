name: Deploy Backend

on:
   push:
      branches:
         - master

jobs:
   deploy:
      runs-on: ubuntu-latest

      steps:
         - name: Deploy to server
           uses: appleboy/ssh-action@v1.0.3
           with:
              host: ${{ secrets.SERVER_HOST }}
              username: ${{ secrets.SERVER_USER }}
              key: ${{ secrets.SERVER_SSH_KEY }}
              script: |
                  cd /root/versaile-backend
                  ./deploy.sh
